<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | BusTrack</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    /* Admin specific overrides to fit the aesthetic */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .admin-container {
      padding: 80px 20px 20px; /* Leave room for navbar */
      max-width: 1200px;
      margin: 0 auto;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr 1fr;
      }
      .full-width {
        grid-column: 1 / -1;
      }
    }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .admin-card h2 {
      margin-top: 0;
      font-size: 18px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th, .data-table td {
      text-align: left;
      padding: 12px 8px;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      color: var(--text-muted);
      font-weight: 500;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    
    input[type="text"], select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-family: inherit;
    }
    
    #map {
      height: 300px;
      border-radius: 12px;
      z-index: 1;
    }
    
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.active { background: #10b981; box-shadow: 0 0 5px #10b981; }
    .status-dot.inactive { background: #ef4444; }

    .admin-bus-tooltip {
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--border);
      color: white;
      font-weight: bold;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand">BusTrack <em>Admin Console</em></div>
    <div class="nav-right" style="display: flex; align-items: center; gap: 15px;">
      <span class="user-greeting" id="admin-name-display">Admin</span>
      <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-grid">
      
      <!-- Realtime Monitoring (Full Width) -->
      <div class="admin-card full-width">
        <h2>Realtime Monitoring <span id="active-trips-count" style="font-size: 14px; font-weight: normal; background: var(--accent); padding: 2px 8px; border-radius: 12px;">0 Active Trips</span></h2>
        <div id="map"></div>
      </div>

      <!-- Bus Management -->
      <div class="admin-card">
        <h2>Bus Management <button class="btn btn-primary btn-sm" onclick="showAddBus()">+ Add Bus</button></h2>
        <div style="overflow-x: auto;">
          <table class="data-table" id="bus-table">
            <thead>
              <tr>
                <th>Bus ID</th>
                <th>Assigned Driver</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rendered via JS -->
              <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Driver Management -->
      <div class="admin-card">
        <h2>Driver Management</h2>
        <div style="overflow-x: auto;">
          <table class="data-table" id="driver-table">
            <thead>
              <tr>
                <th>Driver Name</th>
                <th>Username</th>
                <th>Assigned Bus</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rendered via JS -->
              <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/session-protection.js"></script>
  <script src="js/admin-dashboard.js"></script>

  <script>
    protectRoute('admin');
    const session = JSON.parse(localStorage.getItem('adminSession'));
    if (session) {
      document.getElementById('admin-name-display').textContent = session.username;
    }

    function logoutAdmin() {
      localStorage.removeItem('adminSession');
      window.location.href = 'admin-login.html';
    }
  </script>
</body>
</html>
