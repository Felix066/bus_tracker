<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | BusTrack</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    /* Admin specific overrides to fit the aesthetic */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .admin-container {
      padding: 80px 20px 20px; /* Leave room for navbar */
      max-width: 1200px;
      margin: 0 auto;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr 1fr;
      }
      .full-width {
        grid-column: 1 / -1;
      }
    }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .admin-card h2 {
      margin-top: 0;
      font-size: 18px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th, .data-table td {
      text-align: left;
      padding: 12px 8px;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      color: var(--text-muted);
      font-weight: 500;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    
    input[type="text"], select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-family: inherit;
    }
    /* V2 Redesign Additions */
    .table-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .table-header-bar h2 {
      margin: 0;
      font-size: 18px;
      color: white;
      border: none;
      padding: 0;
    }
    
    .driver-assign-cell {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .driver-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-family: inherit;
      width: 200px;
    }
    .save-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .clear-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    /* Modal Styles */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal.hidden {
      display: none;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .modal-box h3 { margin-top: 0; color: white; margin-bottom: 20px; }
    .modal-box label { display: block; color: var(--text-muted); margin-bottom: 6px; font-size: 14px; }
    .modal-box input { width: 100%; margin-bottom: 20px; box-sizing: border-box; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.active { background: #10b981; box-shadow: 0 0 5px #10b981; }
    .status-dot.inactive { background: #ef4444; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand">BusTrack <em>Admin Console</em></div>
    <div class="nav-right" style="display: flex; align-items: center; gap: 15px;">
      <span class="user-greeting" id="admin-name-display">Admin</span>
      <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-grid">
      
      <!-- Bus Management -->
      <div class="admin-card full-width">
        <div class="table-header-bar">
          <h2>Bus Management</h2>
          <button class="btn btn-primary" onclick="openAddBusModal()">
            <i class="fas fa-plus"></i> Add Bus
          </button>
        </div>
        <div style="overflow-x: auto;">
          <table class="data-table" id="bus-table">
            <thead>
              <tr>
                <th>Bus ID</th>
                <th>Assigned Driver</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Rendered via JS -->
              <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Bus Modal -->
  <div id="addBusModal" class="modal hidden">
    <div class="modal-box">
      <h3>Add New Bus</h3>
      <label>Bus ID / Name:</label>
      <input type="text" id="newBusId" placeholder="e.g. Bus 7" />
      <div class="modal-actions">
        <button class="btn btn-danger" onclick="closeAddBusModal()">✕ Cancel</button>
        <button class="btn btn-primary" onclick="addNewBus()">✓ Confirm Add</button>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/session-protection.js"></script>
  <script src="js/admin-dashboard.js"></script>

  <script>
    protectRoute('admin');
    const session = JSON.parse(localStorage.getItem('adminSession'));
    if (session) {
      document.getElementById('admin-name-display').textContent = session.username;
    }

    function logoutAdmin() {
      localStorage.removeItem('adminSession');
      window.location.href = 'admin-login.html';
    }
  </script>
</body>
</html>
