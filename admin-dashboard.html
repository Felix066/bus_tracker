<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | BusTrack</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #ef4444; /* Match the red 'Remove' button */
      --btn-bg: #ef4444;
      --btn-hover: #dc2626;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* V3 Top Header */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      margin-top: 40px;
      gap: 20px;
    }
    .admin-header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }
    .header-actions {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .search-bar {
      background: #f3f4f6;
      border: 1px solid transparent;
      color: var(--text);
      padding: 10px 16px;
      border-radius: 12px;
      width: 250px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .search-bar:focus {
      background: var(--surface);
      border-color: #d1d5db;
      outline: none;
    }
    .btn-add {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #cbd5e1;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn-add:hover { background: #f1f5f9; }

    /* SOS Banner */
    #sos-banner {
      background: #ef4444;
      color: white;
      text-align: center;
      padding: 15px;
      font-weight: bold;
      font-size: 16px;
      display: none;
      animation: pulse-red 1.5s infinite;
      position: sticky;
      top: 60px;
      z-index: 100;
    }
    @keyframes pulse-red { 0% { background: #ef4444; } 50% { background: #b91c1c; } 100% { background: #ef4444; } }

    /* Table Container */
    .table-wrapper {
      padding: 0 40px 40px;
    }
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      overflow: hidden;
      padding: 30px;
    }

    /* Modern Table */
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 15px 10px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 20px 10px;
      vertical-align: middle;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    
    /* Inline Editing Inputs */
    .inline-input {
      background: #f3f4f6;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      width: 150px;
      transition: all 0.2s;
    }
    .inline-input:focus {
      background: var(--surface);
      border-color: #9ca3af;
      outline: none;
    }
    .btn-inline-save {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 8px;
    }
    .btn-inline-save:hover { background: #059669; }
    .driver-name-display {
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .driver-name-display:hover {
      background: #f3f4f6;
    }
    .driver-name-display i {
      font-size: 12px;
      color: #9ca3af;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .driver-name-display:hover i {
      opacity: 1;
    }

    /* Status Dots */
    .status-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .status-dot.active { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.4); }
    .status-dot.offline { background: #9ca3af; }
    .status-dot.idle { background: #eab308; }

    /* Actions */
    .actions-cell {
      display: flex;
      gap: 10px;
    }
    .btn-remove {
      background: var(--btn-bg);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-remove:hover { background: var(--btn-hover); }
    
    .btn-edit-row {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-edit-row:hover { background: #e2e8f0; }

    /* Admin Logs Section */
    .logs-section {
      margin: 0 40px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .logs-section h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: var(--text); }
    .log-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 13px;
    }
    .log-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
    }
    .log-item span.log-action { color: var(--text); }

    /* Master Edit Modal */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .modal.hidden { display: none; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: 500px; max-width: 90vw;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      max-height: 90vh; overflow-y: auto;
      color: var(--text);
    }
    .modal-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h3 { margin: 0; font-size: 18px; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; }
    .modal-close:hover { color: var(--text); }
    
    .modal-body { padding: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
    .form-group input { width: 100%; background: #f9fafb; border: 1px solid #d1d5db; color: var(--text); padding: 10px; border-radius: 8px; box-sizing: border-box; }
    .form-group input:focus { border-color: #9ca3af; outline:none; }
    
    .form-section-title { font-size: 14px; font-weight: 700; color: #3b82f6; margin: 25px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
    
    .file-input-wrapper { display: flex; align-items: center; gap: 10px; }
    .file-input-wrapper input[type="file"] { flex-grow: 1; padding: 6px; border:none; background:transparent;}
    .btn-remove-photo { background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
    .btn-remove-photo:hover { background: #dc2626; }

    .modal-footer {
      padding: 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
      background: #f9fafb;
      border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
    }
    .btn-save { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #2563eb; }
    .btn-cancel { background: white; color: #4b5563; border: 1px solid #d1d5db; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-cancel:hover { background: #f3f4f6; }
    
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
        padding: 20px;
        margin-top: 20px;
      }
      .header-actions {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }
      .search-bar { width: 100%; box-sizing: border-box; }
      .btn-add { width: 100%; justify-content: center; }
      .table-wrapper { padding: 0 20px 20px; }
      .table-container { padding: 15px; overflow-x: auto; }
      .logs-section { margin: 0 20px 40px; padding: 15px; }
      .navbar { padding: 15px 20px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand" style="color:var(--text);">BusTrack <em>Admin Platform</em></div>
    <div class="nav-right" style="display: flex; align-items: center; gap: 15px;">
      <a href="admin-sos.html" style="position: relative; color: var(--text-muted); font-size: 20px; text-decoration: none; margin-right: 10px;">
        <i class="fas fa-bell"></i>
        <span id="sos-badge" style="display: none; position: absolute; top: -5px; right: -8px; background: #ef4444; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; padding: 2px 6px;">0</span>
      </a>
      <span class="user-greeting" id="admin-name-display" style="color:var(--text-muted);">Admin</span>
      <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
    </div>
  </nav>

  <!-- HEADER SECTION -->
  <div class="admin-header">
    <div>
      <h1>Fleet Overview</h1>
      <p style="color: var(--text-muted); margin: 5px 0 0; font-size: 14px;">Manage all buses, routes, and drivers in real-time.</p>
    </div>
    <div class="header-actions">
      <input type="text" class="search-bar" id="filterFleet" autocomplete="off" placeholder="Search buses, drivers, routes..." onkeyup="filterBuses()">
      <button class="btn-add" onclick="openMasterModal()">
        + Add Bus
      </button>
    </div>
  </div>

  <!-- TABLE CONTAINER -->
  <div class="table-wrapper">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Bus ID</th>
            <th>Assigned Driver</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bus-table-body">
          <!-- Rendered via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- ACTIVITY LOGS -->
  <div class="logs-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 style="margin: 0;">Admin Activity Log</h3>
      <button onclick="clearAdminLogs()" style="background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.color='var(--text)'; this.style.borderColor='#9ca3af'" onmouseout="this.style.color='var(--text-muted)'; this.style.borderColor='var(--border)'"><i class="fas fa-trash"></i> Clear History</button>
    </div>
    <div class="log-list" id="log-list">
      <!-- Rendered via JS -->
    </div>
  </div>

  <!-- MASTER EDIT MODAL -->
  <div id="masterModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Bus</h3>
        <button class="modal-close" onclick="closeMasterModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <!-- Hidden ID -->
        <input type="hidden" id="editBusId" value="">
        <input type="hidden" id="isNewBus" value="true">

        <div class="form-section-title">Vehicle Details</div>
        <div class="form-group">
          <label>Bus Name / ID (e.g. Bus 7)</label>
          <input type="text" id="inpBusName" placeholder="Bus Name">
        </div>
        <div class="form-group">
          <label>Route Name</label>
          <input type="text" id="inpRoute" placeholder="e.g. Kottarakkara → Providence">
        </div>
        <div class="form-group">
          <label>Number Plate</label>
          <input type="text" id="inpPlate" placeholder="e.g. KL-01-AB-1234">
        </div>
        <div class="form-group">
          <label>Bus Photo</label>
          <div class="file-input-wrapper">
            <input type="file" id="inpBusPhoto" accept="image/*">
            <button class="btn-remove-photo" id="btnRemoveBusPhoto" onclick="removePhoto('bus')" style="display:none;" type="button" title="Delete Photo"><i class="fas fa-trash"></i></button>
          </div>
          <img id="busPhotoPreview" src="" style="display:none; width:60px; height:60px; border-radius:8px; object-fit:cover; margin-top:10px;">
        </div>

        <div class="form-section-title">Driver Details</div>
        <div class="form-group">
          <label>Assigned Driver Name</label>
          <input type="text" id="inpDriverName" placeholder="Driver Name">
        </div>
        <div class="form-group">
          <label>Driver Phone Number</label>
          <input type="text" id="inpDriverPhone" placeholder="e.g. 91XXXXXXXX">
        </div>
        <div class="form-group">
          <label>Driver Profile Photo</label>
          <div class="file-input-wrapper">
            <input type="file" id="inpDriverPhoto" accept="image/*">
            <button class="btn-remove-photo" id="btnRemoveDriverPhoto" onclick="removePhoto('driver')" style="display:none;" type="button" title="Delete Photo"><i class="fas fa-trash"></i></button>
          </div>
          <img id="driverPhotoPreview" src="" style="display:none; width:60px; height:60px; border-radius:8px; object-fit:cover; margin-top:10px;">
        </div>

        <div class="form-section-title">Driver Login Credentials</div>
        <div class="form-group">
          <label>Driver Username</label>
          <input type="text" id="inpDriverUser" autocomplete="new-password" placeholder="e.g. driver7">
        </div>
        <div class="form-group">
          <label>Driver Password</label>
          <input type="password" id="inpDriverPass" autocomplete="new-password" placeholder="Leave blank to keep existing password">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeMasterModal()">Cancel</button>
        <button class="btn-save" id="btnSaveBus" onclick="saveMasterBus()">Save Bus</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=2"></script>
  <script src="js/session-protection.js?v=2"></script>
  <script src="js/admin-dashboard.js?v=3"></script>

  <script>
    protectRoute('admin');
    const session = JSON.parse(localStorage.getItem('adminSession'));
    if (session) {
      document.getElementById('admin-name-display').textContent = session.username;
    }

    function logoutAdmin() {
      localStorage.removeItem('adminSession');
      window.location.href = 'driver-login.html';
    }
  </script>
</body>
</html>
