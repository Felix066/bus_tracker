<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Dashboard | BusTrack</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/driver.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BusTrack">
</head>
<body>
<div id="offline-indicator" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1A1A1A; color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:500; font-family:Inter,sans-serif; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); align-items:center; gap:8px;">
  You are offline - showing cached data
</div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand">BusTrack <em>Driver Console</em></div>
    <span class="driver-label" id="driver-name-display">driver1</span>
    <span class="bus-badge" id="assigned-bus-label">Assigned Bus: Bus 4</span>
    <button class="start-btn" id="start-btn" onclick="startTrip()">Start Trip</button>
    <button class="logout-btn" onclick="driverLogout()" style="margin-left: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </nav>

  <!-- STAT CARDS — 3 cards, Next Stop hidden for JS only -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Speed</div>
      <div class="stat-value" id="speed-display">0.0 km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Duration</div>
      <div class="stat-value" id="trip-duration-display">00:00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Current Position</div>
      <div class="stat-value searching" id="location-display">Searching...</div>
    </div>
  </div>

  <!-- Hidden next stop for JS reference — not visible on page -->
  <span id="next-stop-display" style="display:none;"></span>

  <!-- TRIP STATUS BAR — shows when trip is active -->
  <div class="trip-status-bar" id="trip-status-bar">
    <div class="status-dot-green"></div>
    <span id="trip-status-text">Trip active — GPS tracking live</span>
  </div>

  <!-- MAP -->
  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- SOS BUTTON -->
  <button id="sos-btn" onclick="triggerSOS()" style="position:fixed; bottom:40px; right:20px; background:#ef4444; color:white; border:none; padding:15px 25px; border-radius:30px; font-weight:bold; font-size:16px; box-shadow:0 10px 20px rgba(239,68,68,0.4); z-index:9999; cursor:pointer; display:flex; gap:10px; align-items:center;">
    <i class="fas fa-exclamation-triangle"></i> SOS EMERGENCY
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=5"></script>
  <script src="js/haversine.js"></script>
  <script src="js/kalman.js"></script>
  <script src="js/routes.js"></script>
  <script src="js/map.js"></script>
  <script src="js/location.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/trip.js?v=2"></script>
  <script src="js/sync.js?v=5"></script>
  <script src="js/driver-auth.js?v=5"></script>
  <script src="js/session-protection.js"></script>

  <script>
    protectRoute('driver');
    const driver = JSON.parse(localStorage.getItem('driverSession'));
    if (!driver || !driver.driverId) window.location.href = 'driver-login.html';

    // UPDATE 8 — Driver Bus Assignment Restriction
    function lockBusToDriver() {
      const session     = JSON.parse(localStorage.getItem('driverSession'));
      const assignedBus = session.assignedBus || session.busId; // fallback to busId if assignedBus not set

      const select = document.getElementById('bus-select');
      if (select && assignedBus) {
        // Clear and add only the assigned bus
        select.innerHTML = `<option value="${assignedBus}">${assignedBus}</option>`;
        select.value     = assignedBus;
        select.disabled  = true;
      }
      
      if (assignedBus) {
        const label = document.getElementById('assigned-bus-label');
        if (label) label.textContent = assignedBus;
      }
    }

    document.getElementById('driver-name-display').textContent = driver.username;
    lockBusToDriver();

    // Init map defaults
    const defaultType = 'morning';
    initMap(defaultType);
    
    // Get immediate location so the map isn't empty before starting the trip
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const busLabel = driver.assignedBus ? driver.assignedBus.replace(/bus\s*/i, 'B').toUpperCase() : 'BUS';
            if (typeof updateBusMarker === 'function') {
                updateBusMarker(lat, lon, busLabel);
            }
        }, () => {}, { timeout: 10000 });
    }

    // Removed shift change dropdown logic as it's no longer needed

    // Subscribe to realtime location updates for map/chart synchronization
    if (driver && (driver.assignedBus || driver.busId)) {
      subscribeToBus(driver.assignedBus || driver.busId, defaultType);
    }

    // UPDATE 13 — Trip Recovery After Page Refresh
    if (typeof recoverActiveTrip === 'function') {
      recoverActiveTrip();
    }
  </script>

<script>
window.addEventListener('online', () => {
  document.getElementById('offline-indicator').style.display = 'none';
  console.log('[Network] Back online');
});

window.addEventListener('offline', () => {
  document.getElementById('offline-indicator').style.display = 'flex';
  console.log('[Network] Gone offline');
});

if (!navigator.onLine) {
  document.getElementById('offline-indicator').style.display = 'flex';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => {
        console.log('[BusTrack] Service Worker registered:', reg.scope);
      })
      .catch((err) => {
        console.warn('[BusTrack] Service Worker failed:', err);
      });
  });
}

// Ensure offline on unload and maintain heartbeat
(function() {
  const driverSession = JSON.parse(localStorage.getItem('driverSession'));
  const activeBus = driverSession ? (driverSession.assignedBus || driverSession.busId) : null;
  const token = driverSession ? driverSession.token : null;
  
  if (driverSession && activeBus && token) {
    window.addEventListener('beforeunload', () => {
      // Fire-and-forget offline status update
      fetch(`${BACKEND_URL}/api/auth/logout-driver`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    });

    const sendHeartbeat = () => {
      if (navigator.onLine) {
        fetch(`${BACKEND_URL}/api/trip/heartbeat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ bus_id: activeBus })
        });
      }
    };

    // Run immediately, then every 30 seconds to be more responsive
    sendHeartbeat();
    setInterval(sendHeartbeat, 30000);
  }
})();
</script>
</body>
</html>
