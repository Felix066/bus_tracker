<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | BusTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
    .login-container {
      background: var(--surface);
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }
    .brand {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }
    .brand em {
      color: var(--accent);
      font-style: normal;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-family: inherit;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #1d4ed8;
    }
    .error-msg {
      color: #ef4444;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand">BusTrack <em>Admin</em></div>
    
    <form id="admin-login-form">
      <div class="form-group">
        <label for="username">Admin Username</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="login-btn" id="login-btn">Login to Console</button>
      <div class="error-msg" id="error-msg">Invalid credentials. Please try again.</div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // Redirect if already logged in
    const session = JSON.parse(localStorage.getItem('adminSession'));
    if (session && session.role === 'admin') {
      window.location.href = 'admin-dashboard.html';
    }

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');

      btn.textContent = 'Authenticating...';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        // Use the secure RPC function to validate the password hash
        const { data: isValid, error } = await supabase.rpc('admin_login', {
          p_username: user,
          p_password: pass
        });

        if (error) throw error;

        if (isValid) {
          localStorage.setItem('adminSession', JSON.stringify({
            username: user,
            role: 'admin',
            loginTime: Date.now()
          }));
          window.location.href = 'admin-dashboard.html';
        } else {
          throw new Error('Invalid credentials');
        }
      } catch (error) {
        console.error(error);
        err.style.display = 'block';
        btn.textContent = 'Login to Console';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
