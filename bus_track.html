<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking | Bus 4</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/timeline.css">
</head>
<body>
  <div class="map-page-container">
    <div id="map">
      <div class="map-overlay-back">
        <button onclick="window.location.href='student-dashboard.html'" class="br-14">← Dashboard</button>
      </div>
    </div>

    <div class="tracking-sidebar">
      <div class="bus-meta-card">
        <h2 id="bus-name-display">Bus 4</h2>
        <p id="trip-type-display">Morning Trip</p>
      </div>

      <div class="timeline-wrapper">
        <div id="chart-bus-marker">🚌</div>
        <div class="stop-timeline" id="stop-timeline">
          <div class="timeline-header">
            <h3>Route Progress</h3>
            <p>17 total stops</p>
          </div>
          <!-- Rows -->
        </div>
      </div>
    </div>
  </div>

  <!-- Permission Modal -->
  <div id="gps-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 style="margin-bottom: 12px;">Share your GPS?</h2>
      <p style="margin-bottom: 24px; color: #666; font-size: 14px;">You are within 10m of the bus! Allow location to help other students track the bus accurately.</p>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button id="allow-gps-btn" style="flex: 1; background: var(--accent-green-light);">Allow</button>
        <button onclick="document.getElementById('gps-modal').classList.add('hidden')" style="flex: 1; background: #999;">Dismiss</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/haversine.js"></script>
  <script src="js/kalman.js"></script>
  <script src="js/routes.js"></script>
  <script src="js/map.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/location.js"></script>
  <script src="js/gps.js"></script>
  <script src="js/sync.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const busId = urlParams.get('busId') || 'Bus 4';
    const userRole = JSON.parse(localStorage.getItem('userSession'))?.role || 'student';

    async function init() {
      // 1. Fetch active trip
      const { data: trip } = await supabase
        .from('trips')
        .select('*')
        .eq('bus_id', busId)
        .eq('status', 'active')
        .single();

      if (!trip) return;

      document.getElementById('trip-type-display').textContent = trip.trip_type.toUpperCase() + ' TRIP';

      // 2. Load route data
      const route = getRoute(trip.trip_type);

      // 3. Init visuals
      initMap(trip.trip_type);
      renderTimeline(route, 0);

      // 4. Realtime Sync
      subscribeToBus(busId, trip.trip_type);

      // 5. Proximity logic
      async function triggerPermissionCheck() {
        const isNear = await checkProximityToDriver(trip.id);
        if (isNear) {
          document.getElementById('gps-modal').classList.remove('hidden');
        }
      }

      document.getElementById('allow-gps-btn').onclick = () => {
        document.getElementById('gps-modal').classList.add('hidden');
        startPassengerGPS(trip.id, busId, userRole);
      };

      triggerPermissionCheck();
      setInterval(triggerPermissionCheck, 10000);
    }

    init();
  </script>
</body>
</html>
