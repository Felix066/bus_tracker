<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking | Bus 4</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BusTrack">
</head>
<body>
<div id="offline-indicator" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1A1A1A; color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:500; font-family:Inter,sans-serif; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); align-items:center; gap:8px;">
  You are offline - showing cached data
</div>
  <div class="map-page-container">

    <div id="map">
      <div class="map-overlay-back">
        <button onclick="window.location.href='student-dashboard.html'" class="br-14">← Dashboard</button>
      </div>
    </div>

    <div class="tracking-sidebar">
      <div class="bus-meta-card">
        <h2 id="bus-name-display">Bus 4</h2>
        <p id="trip-type-display">Morning Trip</p>
        
        <!-- UPDATE 5 — User Location Permission Flow -->
        <div style="margin-top: 15px;">
          <button id="enable-tracking-btn" class="track-btn">
            📍 Enable Live Tracking
          </button>
          <p id="tracking-status" style="font-size: 12px; margin-top: 5px; color: #666;"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/haversine.js"></script>
  <script src="js/kalman.js"></script>
  <script src="js/routes.js"></script>
  <script src="js/map.js"></script>
  <script src="js/location.js"></script>
  <script src="js/gps.js"></script>
  <script src="js/sync.js"></script>

  <style>
    .track-btn {
      background: #2563EB; color: white;
      border: none; padding: 10px 15px;
      border-radius: 8px; cursor: pointer;
      font-weight: 500; width: 100%;
    }
    .track-btn:disabled {
      background: #10B981; cursor: default;
    }
  </style>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const busId = urlParams.get('bus') || urlParams.get('busId') || 'Bus 4';
    const userRole = JSON.parse(localStorage.getItem('userSession'))?.role || 'student';
    let lastUpdateTime = Date.now();
    let activeTripId = null;

    // UPDATE 6 — Active Trip Detection
    async function checkActiveTrip() {
      const { data: trip } = await supabase
        .from('trips')
        .select('id, trip_type, current_stop_index')
        .eq('bus_id', busId)
        .eq('status', 'active')
        .single();

      if (!trip) {
        document.getElementById('map').style.display          = 'none';
        document.getElementById('enable-tracking-btn').style.display = 'none';
        return;
      }

      activeTripId       = trip.id;
      const currentTripType    = trip.trip_type;
      const currentStopIndex   = trip.current_stop_index || 0;
      
      document.getElementById('trip-type-display').textContent = currentTripType.toUpperCase() + ' TRIP';

      initMap(currentTripType);
      
      // Fetch initial immediately
      supabase.from('computed_locations')
        .select('latitude, longitude')
        .eq('bus_id', busId)
        .order('computed_at', { ascending: false })
        .limit(1)
        .then(({data}) => {
          if (data && data.length > 0) {
             updateBusMarker(data[0].latitude, data[0].longitude, busId);
             if (typeof lastRenderedLat !== 'undefined') {
                 lastRenderedLat = data[0].latitude;
                 lastRenderedLon = data[0].longitude;
             }
          }
        });

      subscribeToBus(busId, currentTripType);
      if (currentStopIndex > 0) {
        setMaxReachedStopIndex(currentStopIndex - 1);
      }
      
      // Store globally for other scripts
      localStorage.setItem('activeTripId', activeTripId);
      localStorage.setItem('userRole', userRole);

      // Offline detection logic removed
    }

    // UPDATE 5 — User Location Permission Flow
    document.getElementById('enable-tracking-btn').addEventListener('click', async () => {
      if (!activeTripId) return;

      // Step 1: Show cached location immediately if available
      showCachedLocationIfAvailable();

      // Get driver's latest location first
      const { data: driverLoc } = await supabase
        .from('bus_locations')
        .select('latitude, longitude')
        .eq('trip_id', activeTripId)
        .eq('source_role', 'driver')
        .order('submitted_at', { ascending: false })
        .limit(1).single();

      if (!driverLoc) {
        alert('Driver location not available yet. Please try again.');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          // UPDATE 12 — GPS Accuracy Filtering
          if (pos.coords.accuracy > 50) {
            document.getElementById('tracking-status').textContent = 
                'Poor GPS accuracy (' + Math.round(pos.coords.accuracy) + 'm). Try moving to a clearer area.';
            return;
          }

          const dist = haversineDistance(
            pos.coords.latitude, pos.coords.longitude,
            driverLoc.latitude, driverLoc.longitude
          );

          if (dist <= 10) {
            startPassengerGPS(activeTripId, busId, userRole);
            document.getElementById('enable-tracking-btn').textContent = '✅ Tracking Active';
            document.getElementById('enable-tracking-btn').disabled = true;
            document.getElementById('tracking-status').textContent =
              'Your location is helping improve bus accuracy.';
          } else {
            document.getElementById('tracking-status').textContent =
              'You appear to not be on this bus. Tracking not started.';
          }
        },
        () => {
          document.getElementById('tracking-status').textContent =
            'Location permission denied. You can still view the map.';
        },
        { enableHighAccuracy: true }
      );
    });

    // Update lastUpdateTime whenever a new location arrives
    window.onLocationUpdateReceived = () => {
        lastUpdateTime = Date.now();
    };

    checkActiveTrip();
  </script>
<script>
window.addEventListener('online', () => {
  document.getElementById('offline-indicator').style.display = 'none';
  console.log('[Network] Back online');
});

window.addEventListener('offline', () => {
  document.getElementById('offline-indicator').style.display = 'flex';
  console.log('[Network] Gone offline');
});

if (!navigator.onLine) {
  document.getElementById('offline-indicator').style.display = 'flex';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => {
        console.log('[BusTrack] Service Worker registered:', reg.scope);
      })
      .catch((err) => {
        console.warn('[BusTrack] Service Worker failed:', err);
      });
  });
}
</script>
</body>
</html>
