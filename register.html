<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - BusTrack</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .info-box {
      background: #f0f8ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-size: 14px;
      color: #555;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-weight: 600;
    }

    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚌 BusTrack Registration</h1>
    
    <div class="info-box" id="infoBox">
      Validating your invitation...
    </div>

    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox"></div>

    <form id="registrationForm" style="display: none;">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          readonly
          style="background: #f9f9f9; color: #666;"
        >
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <input 
          type="text" 
          id="role" 
          readonly
          style="background: #f9f9f9; color: #666;"
        >
      </div>

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input 
          type="text" 
          id="fullName" 
          placeholder="Enter your full name"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Create a strong password"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="Confirm your password"
          required
        >
      </div>

      <button type="submit">Create Account</button>
    </form>

    <div class="loading" id="loadingBox">
      Creating your account...
    </div>

    <div class="link">
      Already have an account? 
      <a href="index.html">Login here</a>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const BACKEND_URL = 'http://localhost:3001';

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Validate token on page load
    window.addEventListener('DOMContentLoaded', async () => {
      if (!token) {
        showError('No invitation token provided. Invalid registration link.');
        return;
      }

      await validateToken(token);
    });

    async function validateToken(token) {
      try {
        const response = await fetch(
          `${BACKEND_URL}/api/auth/validate-token/${token}`
        );
        const data = await response.json();

        if (!data.valid) {
          showError(data.error || 'Invalid or expired invitation');
          return;
        }

        // Show form with pre-filled email and role
        document.getElementById('email').value = data.email;
        document.getElementById('role').value = data.role;
        document.getElementById('infoBox').textContent = 
          `Welcome! You're invited to register as a ${data.role}.`;
        document.getElementById('infoBox').style.background = '#efe';
        document.getElementById('registrationForm').style.display = 'block';

      } catch (error) {
        showError('Failed to validate invitation: ' + error.message);
      }
    }

    document.getElementById('registrationForm').addEventListener('submit', 
      async (e) => {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const fullName = document.getElementById('fullName').value;

        if (password !== confirmPassword) {
          showError('Passwords do not match');
          return;
        }

        if (password.length < 8) {
          showError('Password must be at least 8 characters');
          return;
        }

        await registerWithToken(token, password, fullName);
      }
    );

    async function registerWithToken(token, password, fullName) {
      try {
        document.getElementById('loadingBox').style.display = 'block';
        document.getElementById('registrationForm').style.display = 'none';

        const response = await fetch(
          `${BACKEND_URL}/api/auth/register-with-token`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token,
              password,
              full_name: fullName
            })
          }
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error);
        }

        showSuccess(
          'Account created successfully! Redirecting to login...'
        );

        setTimeout(() => {
          window.location.href = 'index.html?registered=true';
        }, 2000);

      } catch (error) {
        document.getElementById('loadingBox').style.display = 'none';
        document.getElementById('registrationForm').style.display = 'block';
        showError(error.message);
      }
    }

    function showError(message) {
      document.getElementById('errorBox').textContent = '❌ ' + message;
      document.getElementById('errorBox').style.display = 'block';
    }

    function showSuccess(message) {
      document.getElementById('successBox').textContent = '✅ ' + message;
      document.getElementById('successBox').style.display = 'block';
    }
  </script>
</body>
</html>
