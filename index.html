<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | BusTrack</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BusTrack">
</head>
<body class="theme-student">
<div id="offline-indicator" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1A1A1A; color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:500; font-family:Inter,sans-serif; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); align-items:center; gap:8px;">
  You are offline - showing cached data
</div>
  <div class="login-container">
    <div class="login-card">
      <div class="login-panel-left">
        <div class="top-nav">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
              <i class="fas fa-bus"></i>
            </div>
            <span style="font-weight: 800; font-size: 20px; letter-spacing: -0.5px;">BusTrack</span>
          </div>
        </div>
        
        <div>
          <h1 class="tagline">Always know where your bus is.</h1>
          <p style="margin-top: 20px; opacity: 0.7; font-size: 18px; max-width: 320px;">Real-time tracking for students and passengers.</p>
        </div>

        <div style="display: flex; gap: 40px;">
          <div><span style="display:block; font-weight: 800; font-size: 20px;">Live</span><span style="font-size: 11px; opacity: 0.6; text-transform: uppercase; font-weight: 700;">Live Map</span></div>
          <div><span style="display:block; font-weight: 800; font-size: 20px;">All</span><span style="font-size: 11px; opacity: 0.6; text-transform: uppercase; font-weight: 700;">All Routes</span></div>
          <div><span style="display:block; font-weight: 800; font-size: 20px;">Any</span><span style="font-size: 11px; opacity: 0.6; text-transform: uppercase; font-weight: 700;">Any Device</span></div>
        </div>
      </div>

      <div class="login-panel-right">
        <span style="font-size: 11px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block;">Student Portal</span>
        <h2 style="font-size: 42px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px;">Track your bus</h2>
        <p style="color: #6B7280; font-size: 16px; margin-bottom: 40px;">Sign in to see live bus locations on the map.</p>

        <div id="error-banner" class="error-banner hidden"></div>

        <form id="login-form">
          <div class="form-group">
            <label>College Email</label>
            <div class="input-wrapper">
              <i class="far fa-envelope"></i>
              <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper" style="position: relative;">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="••••••••" autocomplete="off" required>
              <i class="fas fa-eye toggle-password" style="position: absolute; left: auto; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9CA3AF; z-index: 10; pointer-events: auto;" onclick="togglePasswordVisibility('password', this)"></i>
            </div>
          </div>



          <button type="submit" class="btn-primary br-14">Sign In <i class="fas fa-arrow-right" style="font-size: 14px; margin-left: 4px;"></i></button>
        </form>

        <div class="bottom-link">
          Are you a driver? <a href="driver-login.html">Sign in here →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js?v=4"></script>
  <script>


    // Login Form Submission
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      const errBanner = document.getElementById('error-banner');
      
      errBanner.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = 'Verifying... <i class="fas fa-spinner fa-spin"></i>';

      try {
        const emailVal = document.getElementById('email').value.trim();
        const passVal = document.getElementById('password').value;
        
        await handleStudentLogin(emailVal, passVal);
        btn.innerHTML = originalText;
        btn.disabled = false;
      } catch (err) {
        errBanner.textContent = err.message;
        errBanner.classList.remove('hidden');
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    };
  </script>
<script>
window.addEventListener('online', () => {
  document.getElementById('offline-indicator').style.display = 'none';
  console.log('[Network] Back online');
});

window.addEventListener('offline', () => {
  document.getElementById('offline-indicator').style.display = 'flex';
  console.log('[Network] Gone offline');
});

if (!navigator.onLine) {
  document.getElementById('offline-indicator').style.display = 'flex';
}

function togglePasswordVisibility(inputId, icon) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => {
        console.log('[BusTrack] Service Worker registered:', reg.scope);
      })
      .catch((err) => {
        console.warn('[BusTrack] Service Worker failed:', err);
      });
  });
}
</script>
</body>
</html>
