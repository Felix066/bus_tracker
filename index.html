<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusTrack - Providence College of Engineering</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="theme-student">
  <div class="login-container">
    <div class="login-card">
      <div class="login-panel-left">
        <div class="branding">
          <h1>BusTrack</h1>
          <p class="tagline">Always know where your bus is.</p>
        </div>
        <div class="stats-row">
          <div class="stat-item"><span class="val">1,200+</span><span class="lbl">Students</span></div>
          <div class="stat-item"><span class="val">12</span><span class="lbl">Buses</span></div>
        </div>
      </div>
      <div class="login-panel-right">
        <h2>Student/Faculty Login</h2>
        <div id="error-banner" class="error-banner hidden"></div>
        <form id="login-form">
          <div class="form-group">
            <label>College Email</label>
            <input type="email" id="email" placeholder="yourname@student.providence.edu.in" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" style="width: 100%;">Sign In</button>
        </form>
        <div class="demo-credentials">
          <p>Demo: <code>test@student.providence.edu.in</code> / <code>password123</code></p>
        </div>
        <div style="margin-top: 20px; text-align: center;">
          <a href="driver-login.html" style="color: var(--text-dark); text-decoration: none; font-size: 14px; font-weight: 600;">Driver Login →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const errBanner = document.getElementById('error-banner');
      errBanner.classList.add('hidden');

      try {
        await handleStudentLogin(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
      } catch (err) {
        errBanner.textContent = err.message;
        errBanner.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
