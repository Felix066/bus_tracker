<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | BusTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <script src="js/icons.js"></script>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BusTrack">
</head>
<body>
<div id="offline-indicator" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1A1A1A; color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:500; font-family:Inter,sans-serif; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.3); align-items:center; gap:8px;">
  You are offline - showing cached data
</div>  

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand" style="display: flex; align-items: center; gap: 8px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="1em" height="1em" style="vertical-align: middle; font-size: 20px;">
  <defs><clipPath id="w-clip"><rect x="0" y="100" width="600" height="400" /></clipPath></defs>
  <g clip-path="url(#w-clip)"><path fill="none" stroke="currentColor" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" d="M 30,60 L 150,300 L 250,100 L 350,300 L 420,160" /></g>
  <g transform="translate(480, 50) rotate(63.4)"><path fill="currentColor" fill-rule="evenodd" d="M 0,-38 A 38,38 0 1,1 -38,0 L -55,-55 Z M 0,-14 A 14,14 0 1,0 0,14 A 14,14 0 1,0 0,-14 Z" /></g>
</svg>
      <span>BusTrack</span>
    </div>
    <div class="nav-right">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1 class="page-title">Available Buses</h1>
    <p class="page-subtitle">Select an active bus to track its live location</p>
  </div>

  <!-- BUS GRID -->
  <div class="bus-grid" id="bus-grid">
    <!-- Cards rendered by dashboard.js -->
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/session-protection.js?v=2"></script>
  <script src="js/routes.js?v=2"></script>
  <script src="js/dashboard.js?v=3"></script>

  <script>
    protectRoute('student');
    const session = JSON.parse(localStorage.getItem('userSession'));
    if (!session) window.location.href = 'index.html';

    // Initial render
    renderBusCards();

    // Refresh every 15 seconds for status updates
    setInterval(renderBusCards, 15000);
  </script>
<script>
window.addEventListener('online', () => {
  document.getElementById('offline-indicator').style.display = 'none';
  console.log('[Network] Back online');
});

window.addEventListener('offline', () => {
  document.getElementById('offline-indicator').style.display = 'flex';
  console.log('[Network] Gone offline');
});

if (!navigator.onLine) {
  document.getElementById('offline-indicator').style.display = 'flex';
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => {
        console.log('[BusTrack] Service Worker registered:', reg.scope);
      })
      .catch((err) => {
        console.warn('[BusTrack] Service Worker failed:', err);
      });
  });
}
</script>
</body>
</html>
