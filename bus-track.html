<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Track | BusTrack</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/bus-track.css">
  
  <meta name="theme-color" content="#F7F5F2">
</head>
<body>

  <!-- OFFLINE MESSAGE -->
  <div class="offline-banner" id="offline-banner">
    No active trip found for Bus 4 at this moment.
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand">BusTrack</div>
    <div class="nav-title" id="nav-title">Bus 4 - Loading...</div>
    <a href="student-dashboard.html" class="back-btn">Back to Dashboard</a>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="map"></div>
  </main>

  <!-- INFO BAR -->
  <div class="info-bar">
    <div class="info-card">
      <div class="info-label">Bus Speed</div>
      <div class="info-value" id="bus-speed">-- km/h</div>
    </div>
    <div class="info-card">
      <div class="info-label">Position</div>
      <div class="info-value" id="bus-position">--</div>
    </div>
    <div class="info-card">
      <div class="info-label">Contributors</div>
      <div class="info-value" id="contributors-count">--</div>
    </div>
  </div>

  <!-- LOCATION SHARING POPUP -->
  <div class="popup-overlay" id="location-popup">
    <div class="popup-card">
      <h2 class="popup-title">Help Improve Tracking</h2>
      <p class="popup-text">
        By sharing your location, you help improve the accuracy of the bus location for everyone. We only use this while you are on this page.
      </p>
      <div class="popup-actions">
        <button class="btn-secondary" id="btn-not-now">Not Now</button>
        <button class="btn-primary" id="btn-share-loc">Share Location</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- App Scripts -->
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/haversine.js"></script>
  <script src="js/gps.js"></script>
  <script src="js/routes.js"></script>
  <script src="js/bus-track.js"></script>

</body>
</html>
