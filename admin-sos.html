<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Command Center | BusTrack</title>
  <script src="js/icons.js?v=13"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --surface2:  #16161f;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --text:      #f0f0f5;
      --muted:     #6b6b80;
      --muted2:    #9191a8;
      --red:       #ff3b5c;
      --red-dim:   rgba(255,59,92,0.15);
      --red-glow:  rgba(255,59,92,0.35);
      --green:     #00d68f;
      --green-dim: rgba(0,214,143,0.12);
      --accent:    #7c6ff7;
      --accent-dim:rgba(124,111,247,0.15);
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --radius:    16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -40vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vh;
      background: radial-gradient(ellipse, rgba(255,59,92,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--red) 0%, #ff6b85 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px var(--red-glow);
      flex-shrink: 0;
    }

    .brand-logo svg { color: white; width: 16px; height: 16px; }

    .brand-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .brand-text em {
      font-style: normal;
      color: var(--muted);
      font-weight: 400;
      margin-left: 6px;
      font-size: 14px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.25);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.3px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); opacity: 1; }
      50%       { box-shadow: 0 0 0 5px transparent; opacity: 0.8; }
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: var(--surface2);
      color: var(--muted2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
    }

    .btn-back svg { width: 14px; height: 14px; }

    /* ── Page Hero ── */
    .hero {
      padding: 52px 40px 36px;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--red);
      margin-bottom: 16px;
      font-family: var(--mono);
    }

    .hero-eyebrow span {
      width: 20px;
      height: 1px;
      background: var(--red);
      display: inline-block;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 12px;
    }

    .hero h1 .highlight {
      background: linear-gradient(90deg, var(--red) 0%, #ff8099 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--muted);
      font-weight: 400;
      max-width: 420px;
      line-height: 1.6;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      gap: 12px;
      padding: 0 40px 40px;
      position: relative;
      z-index: 1;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
    }

    .stat-chip .val {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      font-family: var(--mono);
    }

    .stat-chip .lbl {
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      line-height: 1.3;
    }

    .stat-chip.red .val  { color: var(--red); }
    .stat-chip.green .val { color: var(--green); }
    .stat-chip.accent .val { color: var(--accent); }

    .stat-sep { width: 1px; background: var(--border); align-self: stretch; }

    /* ── Grid ── */
    .alerts-grid {
      padding: 0 40px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    /* ── SOS Card ── */
    .sos-card {
      background: var(--surface);
      border: 1px solid rgba(255,59,92,0.2);
      border-radius: var(--radius-xl);
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      cursor: default;
    }

    .sos-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      background: radial-gradient(ellipse at top left, rgba(255,59,92,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .sos-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,59,92,0.4);
      box-shadow: 0 24px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,59,92,0.15);
    }

    /* Glowing top edge */
    .sos-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      border-radius: 0;
    }

    /* ── Card Header ── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .card-header-left { flex: 1; min-width: 0; }

    .bus-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 6px;
    }

    .bus-id {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .time-stamp {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .active-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .pulse-ring {
      width: 8px;
      height: 8px;
      position: relative;
      flex-shrink: 0;
    }

    .pulse-ring::before, .pulse-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--red);
    }

    .pulse-ring::after {
      background: transparent;
      border: 1px solid var(--red);
      animation: ring-pulse 1.5s ease-out infinite;
    }

    @keyframes ring-pulse {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* ── Divider ── */
    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 20px;
    }

    /* ── Info Grid ── */
    .info-rows {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .info-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--muted2);
    }

    .info-icon svg { width: 15px; height: 15px; }

    .info-content { flex: 1; min-width: 0; padding-top: 2px; }

    .info-label {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .info-value.dimmed {
      color: var(--muted2);
      font-weight: 500;
      font-size: 13px;
    }

    /* ── Map Link ── */
    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
      padding: 7px 14px;
      background: var(--accent-dim);
      border: 1px solid rgba(124,111,247,0.25);
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      color: #a89eff;
      text-decoration: none;
      transition: all 0.2s;
    }

    .map-btn:hover {
      background: rgba(124,111,247,0.25);
      border-color: rgba(124,111,247,0.45);
      color: var(--text);
    }

    .map-btn svg { width: 13px; height: 13px; }

    /* ── Resolve Button ── */
    .btn-resolve {
      width: 100%;
      height: 52px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--muted2);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.1px;
    }

    .btn-resolve svg { width: 15px; height: 15px; }

    .btn-resolve:hover {
      background: var(--green-dim);
      border-color: rgba(0,214,143,0.3);
      color: var(--green);
      box-shadow: 0 0 20px rgba(0,214,143,0.1);
    }

    .btn-resolve:active {
      transform: scale(0.98);
    }

    /* ── Empty State ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 40px;
      text-align: center;
      gap: 20px;
    }

    .empty-icon-wrap {
      width: 80px;
      height: 80px;
      background: var(--green-dim);
      border: 1px solid rgba(0,214,143,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
    }

    .empty-icon-wrap svg { width: 36px; height: 36px; }

    .empty-state h2 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .empty-state p {
      font-size: 15px;
      color: var(--muted);
      max-width: 320px;
    }

    /* ── Loading ── */
    .loading-state {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 100px 40px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .topbar { padding: 0 20px; }
      .hero { padding: 36px 20px 28px; }
      .stats-row { padding: 0 20px 28px; flex-wrap: wrap; }
      .alerts-grid { padding: 0 20px 60px; grid-template-columns: 1fr; }
      .hero h1 { font-size: 30px; }
      .stat-sep { display: none; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <nav class="topbar">
    <a href="admin-dashboard.html" class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="brand-text">BusTrack <em>Emergency Center</em></span>
    </a>

    <div class="topbar-right">
      <div class="live-indicator">
        <span class="live-dot"></span>
        LIVE
      </div>
      <a href="admin-dashboard.html" class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Dashboard
      </a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">
      <span></span> Emergency Command
    </div>
    <h1>Active <span class="highlight">SOS</span> Alerts</h1>
    <p class="hero-sub">Real-time emergency monitoring and response system for the entire fleet.</p>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-chip red">
      <div>
        <div class="val" id="stat-active">–</div>
        <div class="lbl">Active Alerts</div>
      </div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-chip green">
      <div>
        <div class="val" id="stat-resolved">0</div>
        <div class="lbl">Resolved Today</div>
      </div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-chip accent">
      <div>
        <div class="val" id="stat-buses">–</div>
        <div class="lbl">Buses Monitored</div>
      </div>
    </div>
  </div>

  <!-- ALERTS GRID -->
  <div id="alerts-container" class="alerts-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      Connecting to fleet...
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/session-protection.js"></script>
  <script src="js/admin-sos.js"></script>
  <script>
    protectRoute('admin');
  </script>
</body>
</html>
